<!DOCTYPE html>

<html>

<head>
    <title>AI Developer Agent - Chat</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            letter-spacing: 0.3px;
            font-family: 'Segoe UI', sans-serif;
            background: radial-gradient(circle at top, #0f172a, #020617);
            color: white;
            overflow: hidden;
            /* 🚨 remove page scroll */
        }

        .app {
            display: flex;
            height: 100vh;
        }

        /* SIDEBAR */
        .sidebar {
            width: 260px;
            background: rgba(2, 6, 23, 0.9);
            backdrop-filter: blur(8px);
            border-right: 1px solid rgba(255, 255, 255, 0.06);
            display: flex;
            flex-direction: column;
            padding: 10px;
        }

        /* SIDEBAR FIX */
        .sidebar-bottom {
            margin-top: auto;
            padding: 15px;
        }

        .sidebar-bottom button {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: none;
            background: #1e293b;
            color: white;
        }

        /* MAIN */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* CHAT AREA */
        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 40px 20px;
            max-width: 780px;
            /* tighter = premium feel */
            width: 100%;
            margin: 0 auto;
        }

        .typing {
            display: inline-block;
        }

        .typing span {
            animation: blink 1.4s infinite;
        }

        .typing span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes blink {

            0%,
            80%,
            100% {
                opacity: 0.2;
            }

            40% {
                opacity: 1;
            }
        }

        /* MESSAGES */
        .message {
            margin: 14px 0;
            padding: 16px;
            border-radius: 16px;
            position: relative;
            max-width: 75%;
            line-height: 1.6;
            font-size: 15px;
            transition: 0.25s;
        }

        .user {
            background: linear-gradient(135deg, #4f46e5, #2563eb);
            margin-left: auto;
            box-shadow: 0 6px 25px rgba(37, 99, 235, 0.25);
        }

        .ai {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* INPUT BAR (FIXED) */
        .input-container {
            display: flex;
            gap: 10px;
            padding: 15px;
            background: #020617;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .input-container input {
            flex: 1;
            padding: 16px;
            border-radius: 14px;
            border: none;
            background: rgba(255, 255, 255, 0.05);
            color: white;
            font-size: 15px;
            transition: 0.2s;
        }

        .input-container input:focus {
            outline: none;
            box-shadow: 0 0 0 2px rgba(79, 70, 229, 0.6);
        }

        .input-container button {
            padding: 12px 18px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #4f46e5, #2563eb);
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }

        .input-container button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 10px rgba(79, 70, 229, 0.6);
        }

        .chat-box::-webkit-scrollbar {
            width: 6px;
        }

        .chat-box::-webkit-scrollbar-thumb {
            background: #334155;
        }

        .navbar {
            padding: 18px 25px;
            font-weight: 600;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .message-actions {
            display: flex;
            gap: 10px;
            margin-top: 8px;
            opacity: 0;
            transition: 0.2s;
        }

        /* show only on hover */
        .message:hover .message-actions {
            opacity: 1;
        }

        .chat-list {
            overflow-y: auto;
        }

        .chat-list::-webkit-scrollbar {
            width: 5px;
        }

        .chat-list::-webkit-scrollbar-thumb {
            background: #334155;
        }

        .action-btn {
            font-size: 13px;
            cursor: pointer;
            opacity: 0.7;
            transition: 0.2s;
        }

        .action-btn:hover {
            opacity: 1;
            transform: scale(1.2);
        }

        .sidebar-top button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #4f46e5, #2563eb);
            border: none;
            color: white;
            border-radius: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .sidebar-top button:hover {
            transform: scale(1.04);
            box-shadow: 0 0 12px rgba(79, 70, 229, 0.5);
        }

        .chat-item {
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #cbd5f5;
            font-size: 14px;
        }

        .chat-item:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .chat-item.active {
            background: rgba(79, 70, 229, 0.3);
            color: white;
        }

        .logo {
            font-weight: 600;
            font-size: 18px;
            letter-spacing: 0.5px;
        }

        body::before {
            content: "";
            position: fixed;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(79, 70, 229, 0.15), transparent);
            top: -200px;
            left: -200px;
            z-index: -1;
        }

        .chat-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .delete-btn {
            font-size: 12px;
            opacity: 0;
            cursor: pointer;
            transition: 0.2s;
        }

        .chat-item:hover .delete-btn {
            opacity: 0.6;
        }

        .delete-btn:hover {
            opacity: 1;
            color: #ef4444;
        }
    </style>

</head>

<body>

    <div class="app">

        <!-- SIDEBAR -->
        <div class="sidebar">
            <div class="sidebar-top">
                <button onclick="newChat()">+ New Chat</button>
            </div>

            <div id="chatList" class="chat-list"></div>

            <div class="sidebar-bottom">
                <button onclick="clearChat()">🧹 Clear</button>
            </div>
        </div>

        <!-- MAIN CHAT -->
        <div class="main">

            <div class="navbar">
                <div class="logo">AI Developer Agent</div>
            </div>

            <div id="chat" class="chat-box"></div>

            <div class="input-container">
                <input id="message" placeholder="Ask anything..." />
                <button onclick="sendChat()">Send</button>
            </div>

        </div>

    </div>
    <script src="env.js"></script>
    <script>
        const API = window.ENV.API_URL;

        let chats = JSON.parse(localStorage.getItem("allChats")) || [];
        let currentChat = null;
        let isSending = false;
        let currentStream = null;

        const chat = document.getElementById("chat");
        const input = document.getElementById("message");

        /* =========================
           CHAT MANAGEMENT
        ========================= */

        function saveChats() {
            localStorage.setItem("allChats", JSON.stringify(chats));
        }

        function newChat() {
            const chatObj = {
                id: Date.now(),
                title: "New Chat",
                messages: [],
                pinned: false
            };

            chats.unshift(chatObj);
            currentChat = chatObj;

            saveChats();
            renderMessages();
            renderChatList();
        }

        /* =========================
           RENDER
        ========================= */

        function renderMessages() {
            chat.innerHTML = "";

            if (!currentChat || currentChat.messages.length === 0) {
                chat.innerHTML = `
    <div style="text-align:center;margin-top:80px;opacity:0.6;">
      <h2>🚀 AI Developer Agent</h2>
      <p>Ask anything about code, debugging, or development.</p>
    </div>
  `;
                return;
            }

            currentChat.messages.forEach((m, index) => {
                createMessage(m.text, m.type, index);
            });

            chat.scrollTop = chat.scrollHeight;
        }

        function renderChatList() {
            const chatList = document.getElementById("chatList");
            if (!chatList) return;

            chatList.innerHTML = "";

            chats.forEach(chatItem => {
                const div = document.createElement("div");

                div.className =
                    "chat-item" +
                    (chatItem.id === currentChat?.id ? " active" : "");

                div.innerHTML = `
  <span>${chatItem.title}</span>
  <span class="delete-btn">✖</span>
`;

                div.onclick = (e) => {
                    if (e.target.classList.contains("delete-btn")) return;

                    currentChat = chatItem;
                    renderMessages();
                    renderChatList();
                };

                // delete click
                div.querySelector(".delete-btn").onclick = (e) => {
                    e.stopPropagation();

                    if (confirm("Delete this chat?")) {
                        deleteChat(chatItem.id);
                    }
                };

                chatList.appendChild(div);
            });
        }

        /* =========================
           MESSAGE UI
        ========================= */

        function createMessage(text, type, index) {
            const div = document.createElement("div");
            div.className = "message " + type;

            // animation
            div.style.opacity = "0";
            div.style.transform = "translateY(10px)";
            setTimeout(() => {
                div.style.transition = "0.3s";
                div.style.opacity = "1";
                div.style.transform = "translateY(0)";
            }, 10);

            if (text.includes("```")) {
                div.innerHTML = formatCode(text);
            } else {
                div.textContent = text;
            }

            const actions = document.createElement("div");
            actions.className = "message-actions";

            // copy
            const copy = document.createElement("span");
            copy.className = "action-btn";
            copy.textContent = "📋";
            copy.onclick = () => navigator.clipboard.writeText(text);
            actions.appendChild(copy);

            // regenerate
            if (type === "ai") {
                const regen = document.createElement("span");
                regen.className = "action-btn";
                regen.textContent = "🔄";
                regen.onclick = () => regenerate(index);
                actions.appendChild(regen);
            }

            div.appendChild(actions);
            chat.appendChild(div);
        }

        function formatCode(text) {
            const parts = text.split("```");

            return parts.map((p, i) => {
                if (i % 2 === 1) {
                    return `<pre style="background:#020617;padding:10px;border-radius:8px;">${p}</pre>`;
                }
                return `<div>${p}</div>`;
            }).join("");
        }

        /* =========================
           ADD MESSAGE
        ========================= */

        function addMessage(text, type = "ai") {
            if (!currentChat) return;

            currentChat.messages.push({ text, type });

            if (currentChat.messages.length === 1) {
                currentChat.title = text.slice(0, 25);
            }

            saveChats();
            renderMessages();
            renderChatList();
        }

        /* =========================
           STREAMING
        ========================= */

        function streamText(element, text) {
            let i = 0;

            currentStream = setInterval(() => {
                element.textContent += text[i];
                i++;

                chat.scrollTop = chat.scrollHeight;

                if (i >= text.length) {
                    clearInterval(currentStream);
                    currentStream = null;

                    // ✅ update last message properly
                    currentChat.messages.push({
                        text: element.textContent,
                        type: "ai"
                    });

                    saveChats();
                    renderChatList();
                }
            }, 15);
        }

        /* =========================
           SEND CHAT
        ========================= */

        async function sendChat() {
            if (isSending) return;

            // ✅ auto-create chat if none exists
            if (!currentChat) {
                newChat();
            }

            const msg = input.value.trim();
            if (!msg) return;

            isSending = true;

            addMessage(msg, "user");

            // 🔥 Typing dots
            const loader = document.createElement("div");
            loader.className = "message ai";
            loader.innerHTML = '<div class="typing"><span>●</span><span>●</span><span>●</span></div>';
            chat.appendChild(loader);
            chat.scrollTop = chat.scrollHeight;

            input.value = "";

            try {
                const res = await fetch(API + "/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        message: msg,
                        mode: "auto"
                    })
                });

                const data = await res.json();

                loader.remove();

                const aiDiv = document.createElement("div");
                aiDiv.className = "message ai";
                chat.appendChild(aiDiv);

                streamText(aiDiv, data.response);

            } catch (err) {
                loader.remove();
                addMessage("❌ Error connecting server", "ai");
            }

            isSending = false;
        }

        /* =========================
           REGENERATE
        ========================= */

        function regenerate(index) {
            const prevUser = currentChat.messages[index - 1];
            if (!prevUser) return;

            input.value = prevUser.text;
            sendChat();
        }

        /* =========================
           CLEAR CHAT
        ========================= */
        function deleteChat(id) {
            chats = chats.filter(c => c.id !== id);

            // if current chat deleted → switch
            if (currentChat?.id === id) {
                currentChat = chats[0] || null;
            }

            saveChats();
            renderChatList();
            renderMessages();
        }
        function clearChat() {
            if (!currentChat) return;
            currentChat.messages = [];
            renderChatList();
            saveChats();
            renderMessages();
        }

        /* =========================
           INPUT
        ========================= */

        input.addEventListener("keydown", e => {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                sendChat();
            }
        });

        /* =========================
           INIT
        ========================= */

        window.onload = () => {
            if (chats.length === 0) {
                newChat();
            } else {
                currentChat = chats[0];
                renderMessages();
                renderChatList();
            }
        };
    </script>


</body>

</html>
